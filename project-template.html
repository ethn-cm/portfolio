<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{TITLE}} — ethan camarillo</title>
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <link rel="stylesheet" href="../../styles.css?v=36" />
    <script src="../../theme.js?v=5"></script>
    <script type="module" src="../../motion.js?v=8"></script>
  </head>
  <body class="{{BODY_CLASS}}">
    <header class="site-header">
      <a class="wordmark" href="../../index.html">ethan camarillo</a>
      <div class="nav-group">
        <nav>
          <ul>
            <li><a class="current" href="../../index.html">work</a></li>
            <li><a href="mailto:hello@ethancamarillo.com">contact</a></li>
          </ul>
        </nav>
        <button class="theme-toggle" type="button" aria-label="Toggle dark mode"></button>
      </div>
    </header>

    <main class="project">
      <figure class="project-hero">
        {{HERO}}
      </figure>

      <section class="project-intro">
        <h1 class="project-title">{{TITLE}}</h1>
        <dl class="project-meta">
          <dd>{{DURATION}}</dd>
        </dl>
        <div class="project-intro-body">
          {{CONTEXT_BODY}}
        </div>
      </section>

      {{PROBLEM_SECTION}}
      {{STRATEGY_SECTION}}
      {{SOLUTION_SECTION}}

      <nav class="project-nav">
        <a class="prev" href="../../{{PREV_HREF}}">
          <span class="arrow" aria-hidden="true">
            <span class="arrow-glyph">&larr;</span>
            <span class="arrow-glyph arrow-glyph-ghost">&larr;</span>
          </span>
          <span class="label">{{PREV_TITLE}}</span>
        </a>
        <a class="next" href="../../{{NEXT_HREF}}">
          <span class="label">{{NEXT_TITLE}}</span>
          <span class="arrow" aria-hidden="true">
            <span class="arrow-glyph">&rarr;</span>
            <span class="arrow-glyph arrow-glyph-ghost">&rarr;</span>
          </span>
        </a>
      </nav>
    </main>

    <footer class="site-footer">
      <div>&copy; <span data-year>2026</span> Ethan Camarillo</div>
    </footer>
  </body>
</html>
